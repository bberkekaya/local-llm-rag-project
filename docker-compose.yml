services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-rag-backend
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      LLM_MODEL: qwen3.5:9b
      EMBEDDING_MODEL: bge-m3:567m
      GENERATION_NUM_PREDICT: 1024
      CHUNK_SIZE: 1200
      CHUNK_OVERLAP: 200
      ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/app/chromadb_store
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: local-rag-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chromadb_data:
